data_dir: ~/MeetingMinutesTaker/data
log_level: INFO
pipeline:
  mode: automatic
recording:
  audio_device: MacBook Air Microphone
  sample_rate: 16000
  format: flac
  auto_stop_silence_minutes: 5
transcription:
  primary_engine: whisper
  whisper_model: distil-large-v3
  language: auto
  custom_vocabulary: null
diarization:
  enabled: true
  engine: pyannote
  model: pyannote/speaker-diarization-community-1
  embedding_batch_size: 32
  segmentation_batch_size: 32
  pyannote_ai:
    tier: community-1
    api_key_env: PYANNOTEAI_API_KEY
    poll_timeout_seconds: 1800
    poll_interval_seconds: 4
  pyannote_mlx:
    embedding_model: mlx-community/wespeaker-voxceleb-resnet34-LM
generation:
  llm:
    primary_provider: anthropic
    model: claude-opus-4-7
    fallback_provider: null
    fallback_model: null
    temperature: 0.1
    max_output_tokens: 8192
    retry_attempts: 3
    timeout_seconds: 120
    ollama:
      base_url: http://localhost:11434
      timeout_seconds: 300
  templates_dir: templates
  vendors:
  - AWS
  - NetApp
  length_mode: verbose
  generate_email_draft: false
  confidentiality_default: auto
  close_acknowledged_actions: true
  prior_actions_lookback_meetings: 5
brief:
  summarize_with_llm: false
storage:
  database: sqlite
  sqlite_path: db/meetings.db
backup:
  enabled: true
  backup_dir: backups
  interval_hours: 1
export:
  default_out_dir: data/exports
obsidian:
  enabled: true
  vault_path: /Users/jurgenhofkens/Documents/NetApp
notifications:
  enabled: true
  sound: true
  click_url_base: http://localhost:8080/meeting
api:
  host: 127.0.0.1
  port: 8080
  cors_origins:
  - http://localhost:8080
  - http://127.0.0.1:8080
  - http://localhost:3000
  - http://127.0.0.1:3000
retention:
  audio_days: 40
  transcript_days: -1
  minutes_days: -1
  backup_days: 30
security:
  encryption_enabled: false
  encryption_key: ''
performance:
  pytorch_mps_fallback: true
disk:
  default_planned_minutes: 60
  flac_compression_factor: 0.6
  watchdog_interval_seconds: 30
  watchdog_graceful_stop_factor: 0.5
attachments:
  enabled: true
  max_file_size_mb: 50
  allowed_mime_types:
  - application/pdf
  - application/vnd.openxmlformats-officedocument.wordprocessingml.document
  - application/vnd.openxmlformats-officedocument.presentationml.presentation
  - image/png
  - image/jpeg
  - image/heic
  summary_wait_seconds: 60
