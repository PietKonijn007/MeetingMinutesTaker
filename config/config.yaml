data_dir: ~/MeetingMinutesTaker/data
log_level: INFO
pipeline:
  mode: automatic
recording:
  audio_device: MacBook Air Microphone
  sample_rate: 16000
  format: flac
  auto_stop_silence_minutes: 5
transcription:
  primary_engine: whisper
  whisper_model: distil-large-v3
  language: auto
  custom_vocabulary: null
diarization:
  enabled: true
  engine: pyannote
generation:
  llm:
    primary_provider: anthropic
    model: claude-opus-4-7
    fallback_provider: null
    fallback_model: null
    temperature: 0.2
    max_output_tokens: 4096
    retry_attempts: 3
    timeout_seconds: 120
  templates_dir: templates
  # Vendors rendered as per-vendor service feedback sub-sections.
  # Empty list → single generic vendor-feedback block.
  vendors:
    - AWS
    - NetApp
  # concise | standard | verbose — controls detailed-notes length.
  length_mode: concise
  # Also generate a follow-up email draft artifact per meeting.
  generate_email_draft: true
  # auto | public | internal | confidential | restricted
  confidentiality_default: auto
  # Carry prior open action items into prompt and close any acknowledged done.
  close_acknowledged_actions: true
  prior_actions_lookback_meetings: 5
storage:
  database: sqlite
  sqlite_path: db/meetings.db
backup:
  enabled: true
  backup_dir: backups
  interval_hours: 1
obsidian:
  enabled: true
  vault_path: /Users/jurgenhofkens/Documents/NetApp
api:
  host: 127.0.0.1
  port: 8080
  cors_origins:
  - http://localhost:8080
  - http://127.0.0.1:8080
  - http://localhost:3000
  - http://127.0.0.1:3000
retention:
  audio_days: 40
  transcript_days: -1
  minutes_days: -1
  backup_days: 30
security:
  encryption_enabled: false
  encryption_key: ''
performance:
  pytorch_mps_fallback: true
