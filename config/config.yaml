data_dir: ~/MeetingMinutesTaker/data
log_level: INFO
pipeline:
  mode: automatic
recording:
  audio_device: MacBook Air Microphone
  sample_rate: 16000
  format: flac
  auto_stop_silence_minutes: 5
transcription:
  primary_engine: whisper
  whisper_model: medium
  language: auto
  custom_vocabulary: null
diarization:
  enabled: true
  engine: pyannote
generation:
  llm:
    primary_provider: anthropic
    model: claude-sonnet-4-6
    fallback_provider: null
    fallback_model: null
    temperature: 0.5
    max_output_tokens: 4096
    retry_attempts: 3
    timeout_seconds: 120
  templates_dir: templates
storage:
  database: sqlite
  sqlite_path: db/meetings.db
backup:
  enabled: true
  backup_dir: backups
  interval_hours: 1
obsidian:
  enabled: true
  vault_path: /Users/jurgenhofkens/Documents/NetApp/Meeting Minutes
api:
  host: 127.0.0.1
  port: 8080
  cors_origins:
  - http://localhost:8080
  - http://127.0.0.1:8080
  - http://localhost:3000
  - http://127.0.0.1:3000
retention:
  audio_days: 40
  transcript_days: -1
  minutes_days: -1
  backup_days: 30
